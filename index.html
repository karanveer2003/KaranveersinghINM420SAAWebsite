<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Adult 10 Ride Card</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Adult 10 Ride Card</h1>
<div class="date" id="date"></div>
<div class="time" id="time"></div>
<div class="route" id="route">Barrie Transit</div>

<div class="bus-image">
  <img src="https://via.placeholder.com/400x200.png?text=Bus+Image" alt="Bus Illustration" />
</div>

<button class="expire-btn" id="expireBtn">Expire</button>

<div class="expiry-info" id="expiryInfo">
  This pass expires after 90 minutes
</div>
<div class="expiry-time" id="expiryTime" style="margin-top: 10px; font-weight: normal; font-size: 1em; text-align: center;"></div>
<div class="user-id" id="userId">
  User ID 1111697505
</div>

<script src="script.js"></script>
</body>
</html>
